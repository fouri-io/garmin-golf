const map = L.map('map',{zoomControl:true});
L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
  {maxZoom:21,maxNativeZoom:19,attribution:'Imagery © Esri'}).addTo(map);
const layer = L.layerGroup().addTo(map);
const sel = document.getElementById('hole');
D.holes.forEach((h,i)=>{const o=document.createElement('option');o.value=i;
  o.textContent=`Hole ${h.number} · par ${h.par} · ${h.strokes}`;sel.appendChild(o);});
function abbr(c){if(c==='unknown')return'?';if(/Driver/.test(c))return'Dr';if(/Putter/.test(c))return'Pt';
  let m;if(m=c.match(/(\d+)\s*Wood/))return m[1]+'W';if(m=c.match(/(\d+)\s*Hybrid/))return m[1]+'H';
  if(m=c.match(/(\d+)\s*Iron/))return m[1]+'i';if(/PW/.test(c))return'PW';
  if(m=c.match(/(\d+)\s*°|(\d+)°/))return (m[1]||m[2])+'°';return c.slice(0,3);}
function sgColor(sg){if(sg==null)return'#9aa6b2';return sg>=0.1?'#1f9d57':sg<=-0.1?'#d6443c':'#e8a33d';}
function show(i){
  layer.clearLayers();const h=D.holes[i];const pts=[];
  h.shots.forEach(s=>{
    L.polyline([s.start,s.end],{color:'#ffffff',weight:2,opacity:.65}).addTo(layer);
    pts.push(s.start,s.end);
    const yd=s.yards!=null?Math.round(s.yards):'';
    const m=L.marker(s.end,{icon:L.divIcon({className:'',html:`<div class="dot" style="background:${sgColor(s.sg)}"></div>`,iconSize:[16,16]})});
    const sg=s.sg!=null?` · SG ${s.sg>0?'+':''}${s.sg.toFixed(1)}`:'';
    m.bindPopup(`<b>#${s.n} ${s.club}</b> ${yd}y<br>${s.from} → ${s.to}${sg}`);
    if(s.type!=='PUTT') m.bindTooltip(`${abbr(s.club)} ${yd}`,{permanent:true,direction:'right',className:'tag',offset:[8,0]});
    m.addTo(layer);
  });
  const tee=h.shots[0].start;
  L.marker(tee,{icon:L.divIcon({className:'',html:'<div class="dot" style="background:#1f9d57"></div>',iconSize:[16,16]})})
    .bindTooltip('Tee',{permanent:true,direction:'left',className:'tag',offset:[-8,0]}).addTo(layer);
  if(h.pin){L.marker(h.pin).bindPopup('📍 Pin').addTo(layer);pts.push(h.pin);}
  map.fitBounds(pts,{padding:[50,50]});
}
sel.onchange=e=>show(+e.target.value);show(0);
